name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: uv sync --frozen + ruff + mypy + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # uv toolchain (plan §5, D13). CI runs `uv sync --frozen` against the committed lockfile.
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync deps from lockfile (frozen)
        run: uv sync --frozen --extra dev

      - name: Ruff (lint + format check)
        run: uv run ruff check --output-format=github . && uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Pytest (excludes live-data integration tests)
        run: uv run pytest -ra

  secret-scan:
    name: gitleaks (no secrets in repo — plan §15)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
